name: Publish CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cli/**"
      - "common/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build
        working-directory: cli
        run: bun run build

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Publish to npm
        working-directory: cli
        run: |
          jq 'del(.devDependencies["@claudein.org/common"])' package.json > package.tmp.json && mv package.tmp.json package.json
          npm publish --provenance --access public
