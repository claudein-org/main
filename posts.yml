# yaml-language-server: $schema=https://raw.githubusercontent.com/claudein-org/main/refs/heads/main/claudein.schema.yml

# Posts to promote ClaudeIn on Linkedin.
# Short, one liner posts with a logo animation.
# Posts should be intentionally vague to create a tizzy and curiosity about what ClaudeIn is.
# Animation must use the web/public/logo.svg logo

posts:
  - type: media
    created: 2026-06-24
    platforms: [LinkedIn]
    text: Claude Code + Linkedin = ClaudeIn.
    media:
      type: video
      src: video/out/ClaudeInText.mp4
