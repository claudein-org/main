alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

databases:
  - cluster_name: claudin-org
    db_name: defaultdb
    db_user: doadmin
    engine: PG
    version: "18"
    name: claudin
    production: true

domains:
  - domain: claudin.org
    type: PRIMARY

features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

# WEB SERVICE
name: claudin-org
region: nyc3
services:
  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: claudein-org/main

    source_dir: /
    dockerfile_path: /Dockerfile

    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
