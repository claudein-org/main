$schema: https://json-schema.org/draft/2020-12/schema
type: object
properties:
  posts:
    type: array
    items:
      oneOf:
        - type: object
          properties:
            created:
              type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            platforms:
              type: array
              items:
                type: string
                enum:
                  - LinkedIn
                  - Facebook
                  - Instagram
                  - YouTube
            type:
              type: string
              const: text
            text:
              type: string
          required:
            - created
            - platforms
            - type
            - text
          additionalProperties: false
        - type: object
          properties:
            created:
              type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            platforms:
              type: array
              items:
                type: string
                enum:
                  - LinkedIn
                  - Facebook
                  - Instagram
                  - YouTube
            type:
              type: string
              const: media
            text:
              type: string
            media:
              oneOf:
                - type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    type:
                      type: string
                      const: image
                    src:
                      type: string
                      pattern: .*\.(jpg|jpeg|png)$
                  required:
                    - type
                    - src
                  additionalProperties: false
                - type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    type:
                      type: string
                      const: video
                    src:
                      type: string
                      pattern: .*\.(mp4|mkv|avi)$
                  required:
                    - type
                    - src
                  additionalProperties: false
          required:
            - created
            - platforms
            - type
            - media
          additionalProperties: false
required:
  - posts
additionalProperties: false
