Introduction:
  - This is a web app that lets you post to linkedin from the command line.
  - Start with the absolutely minimum viable product (MVP) and then iterate on it.
  - The app has a minimalistic UI, use monospace font and terminal-like style.
  - The homepage has minimal text that explains what the app does and a login button to connect to LinkedIn.
  - The auth route does the login flow (Linkedin callback url)
  - The code is version controlled using git and hosted on GitHub.
  - The app is hosted on Digital Ocean app platform (xxs droplet).
  - The domain is claudein.org.

