Introduction:
  - This is a web app that has an API to publish posts to linkedin.
  - A new user login to the app using their google account.
  - After a successful login, the user can connect their LinkedIn account.
  - The service has a web app and a local cli client:
      - All the data is managed by the client and the web app serves as a UI and as a proxy to the LinkedIn API.
      - the cli and web communicate via websockets.
      - client manage the data in a claudein.yml file.
      - the web only saves post_id, post_url (after the post is published) and post_date (when it was published).
      - client can query the web app for all the history of published posts.
      - client can send to the UI new posts, the UI then shows a preview of the post and lets the user edit, delete or publish it (if the user edit/delete the post the cli updates the local file).
      - local file can be edited by user and external tools (e.g. claud code) directly, the cli will watch for changes and update the web app accordingly.

